services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${DEFAULT_CONNECTION}
      Authentication__Jwt__SigningKey: ${TOKEN_KEY}
      Authentication__Jwt__Issuer: ${JWT_ISSUER:-Foodiya}
      Authentication__Jwt__Audience: ${JWT_AUDIENCE:-FoodiyaApp}
      Authentication__Jwt__AccessTokenLifetimeMinutes: ${JWT_LIFETIME:-60}
